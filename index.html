<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Playlist Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .dark-theme { --bg-primary: #0d1117; --bg-secondary: #1a202c; --text-primary: #e2e8f0; --border-color: #2d3748; --chat-bubble-ai: #2d3748; }
        .light-theme { --bg-primary: #ffffff; --bg-secondary: #f3f4f6; --text-primary: #1f2937; --border-color: #d1d5db; --chat-bubble-ai: #e5e7eb; }
        body { background-color: var(--bg-primary); color: var(--text-primary); }
        .song-item-card { border-color: var(--border-color); }
        .dark-theme .song-item-card { background-color: #1a202c; }
        .light-theme .song-item-card { background-color: #f9fafb; }
        .modal-overlay { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
    </style>
</head>

<body class="dark-theme transition-colors duration-300">

    <div class="flex h-screen overflow-hidden bg-[var(--bg-primary)]">
        <div id="sidebar-overlay" class="fixed inset-0 bg-black opacity-50 z-40 hidden md:hidden"></div>
        <div id="sidebar" class="fixed z-50 top-0 left-0 h-full w-64 bg-[var(--bg-secondary)] transform -translate-x-full transition-transform duration-300 ease-in-out md:static md:translate-x-0 md:w-64">
            <div class="flex flex-col h-full p-4">
                <div class="flex items-center justify-between pb-4 border-b border-[var(--border-color)]">
                    <div class="flex items-center space-x-2">
                        <i class="fas fa-robot text-green-400"></i>
                        <h2 class="text-[var(--text-primary)] text-lg font-semibold">AI Playlist</h2>
                    </div>
                    <button id="sidebar-close-btn" class="md:hidden text-gray-400 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
                </div>
                <div class="mt-4 flex flex-col items-center">
                    <img id="user-avatar" src="https://placehold.co/100x100/1DB954/ffffff?text=U" alt="User Avatar" class="w-16 h-16 rounded-full mb-2">
                    <span id="user-display-name" class="text-lg font-medium text-[var(--text-primary)] break-words w-full text-center">User</span>
                    <button id="spotify-login-button" class="mt-4 w-full py-2 px-4 rounded-full font-medium transition-colors bg-green-500 text-white hover:bg-green-600"><i class="fab fa-spotify mr-2"></i> เข้าสู่ระบบด้วย Spotify</button>
                    <button id="spotify-logout-button" class="mt-2 w-full py-2 px-4 rounded-full font-medium transition-colors bg-red-500 text-white hover:bg-red-600 hidden"><i class="fas fa-sign-out-alt mr-2"></i> ออกจากระบบ Spotify</button>
                </div>
                <div class="flex-grow p-2 overflow-y-auto mt-4 border-t border-[var(--border-color)]">
                    <h3 class="text-sm font-semibold text-gray-400 mb-2 px-2 pt-2">ประวัติเพลย์ลิสต์ที่ Pin ไว้</h3>
                    <div id="playlist-history-container" class="space-y-1">
                        </div>
                </div>
                <div class="mt-auto pt-4 border-t border-[var(--border-color)]">
                    <button id="theme-toggle-button" class="w-full flex items-center justify-between py-2 px-4 rounded-lg text-gray-300 hover:bg-opacity-50 hover:bg-gray-500 transition-colors">
                        <span id="theme-icon-text"><i class="fas fa-sun mr-2"></i> โหมดกลางวัน</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="flex flex-col flex-1 bg-[var(--bg-primary)] transition-colors duration-300 overflow-hidden">
            <div class="flex-shrink-0 p-4 border-b border-[var(--border-color)] flex justify-between items-center bg-[var(--bg-secondary)] md:hidden">
                <h1 class="text-[var(--text-primary)] text-lg font-semibold">AI Playlist Chatbot</h1>
                <button id="sidebar-toggle-button" class="text-gray-400 hover:text-white transition-colors"><i class="fas fa-bars"></i></button>
            </div>
            <div id="chat-history" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-4">
                <div class="flex items-start">
                    <div class="w-10 h-10 rounded-full flex-shrink-0 mr-3"><i class="fas fa-robot text-4xl text-green-500"></i></div>
                    <div class="flex-1">
                        <div class="bg-[var(--chat-bubble-ai)] p-3 rounded-xl rounded-tl-none max-w-lg shadow">
                            <p class="text-sm">สวัสดีครับ! ผมคือ AI ที่จะช่วยคุณค้นหา วิเคราะห์ และสร้างเพลย์ลิสต์เพลง ลองพิมพ์บอกผมได้เลยครับ</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="playlist-controls" class="p-4 pt-0 text-center hidden">
                <button id="create-playlist-btn" class="bg-blue-600 text-white font-semibold py-2 px-6 rounded-full hover:bg-blue-700 transition-colors">
                    <i class="fas fa-plus mr-2"></i> สร้าง Playlist นี้ใน Spotify
                </button>
            </div>

            <div class="p-4 md:p-8 flex-shrink-0">
                <div class="relative flex items-center">
                    <input type="text" id="user-input" placeholder="พิมพ์ข้อความของคุณ..." class="w-full p-4 pl-4 pr-16 bg-[var(--bg-secondary)] border border-[var(--border-color)] rounded-full focus:outline-none focus:ring-2 focus:ring-green-500 transition-colors duration-300 text-[var(--text-primary)]">
                    <button id="send-button" class="absolute right-2 text-white bg-green-500 rounded-full h-10 w-10 flex items-center justify-center hover:bg-green-600 transition-colors duration-300"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] hidden">
        <div class="flex flex-col items-center p-6 rounded-lg bg-gray-800 text-white shadow-lg">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-green-500 border-t-transparent"></div>
            <p class="mt-4 text-sm font-medium">กำลังโหลด...</p>
        </div>
    </div>

    <div id="song-modal-overlay" class="modal-overlay fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-[70] opacity-0 pointer-events-none">
        <div id="song-modal-content" class="modal-content bg-[var(--bg-secondary)] rounded-lg shadow-xl w-full max-w-md p-6 transform scale-95">
            <div class="flex items-start space-x-4">
                <img id="modal-album-art" src="" alt="Album Art" class="w-24 h-24 rounded-lg object-cover">
                <div class="flex-1">
                    <h3 id="modal-song-title" class="text-xl font-bold">Song Title</h3>
                    <p id="modal-artist-name" class="text-md opacity-80">Artist Name</p>
                </div>
                <button id="modal-close-btn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <hr class="border-[var(--border-color)] my-4">
            <div id="modal-analysis-content" class="text-sm prose max-w-none text-[var(--text-primary)]">
                <p>กำลังโหลดการวิเคราะห์...</p>
            </div>
        </div>
    </div>

    <script type="module">
        // --- 1. ประกาศตัวแปร DOM ทั้งหมด (แก้ไขให้ไม่มีการประกาศซ้ำ) ---
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const sidebarToggle = document.getElementById('sidebar-toggle-button');
        const sidebarCloseBtn = document.getElementById('sidebar-close-btn');
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const spotifyLoginButton = document.getElementById('spotify-login-button');
        const spotifyLogoutButton = document.getElementById('spotify-logout-button');
        const userDisplayNameElem = document.getElementById('user-display-name');
        const userAvatarElem = document.getElementById('user-avatar');
        const loadingOverlay = document.getElementById('loading-overlay');
        const themeToggleButton = document.getElementById('theme-toggle-button');
        const themeIconText = document.getElementById('theme-icon-text');
        const playlistControls = document.getElementById('playlist-controls');
        const createPlaylistBtn = document.getElementById('create-playlist-btn');
        const songModalOverlay = document.getElementById('song-modal-overlay');
        const songModalContent = document.getElementById('song-modal-content');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const playlistHistoryContainer = document.getElementById('playlist-history-container');

        // --- 2. ประกาศตัวแปร State ของแอป ---
        let isFetching = false;
        let currentTheme = localStorage.getItem('theme') || 'dark';
        let currentRecommendedSongs = [];
        let pinnedPlaylists = []; // Array สำหรับเก็บประวัติที่ Pin ไว้จาก DB

        // --- 3. กลุ่มฟังก์ชัน Helper ทั่วไป ---
        function showLoading(show) { loadingOverlay.classList.toggle('hidden', !show); }
        function openSidebar() { sidebar.classList.remove('-translate-x-full'); sidebarOverlay.classList.remove('hidden'); }
        function closeSidebar() { sidebar.classList.add('-translate-x-full'); sidebarOverlay.classList.add('hidden'); }
        function openModal() { songModalOverlay.classList.remove('opacity-0', 'pointer-events-none'); songModalContent.classList.remove('scale-95'); }
        function closeModal() { songModalOverlay.classList.add('opacity-0', 'pointer-events-none'); songModalContent.classList.add('scale-95'); }
        
        function toggleTheme() {
            currentTheme = document.body.classList.contains('dark-theme') ? 'light' : 'dark';
            applyTheme(currentTheme);
            localStorage.setItem('theme', currentTheme);
        }
        function applyTheme(theme) {
            document.body.className = `${theme}-theme transition-colors duration-300`;
            themeIconText.innerHTML = theme === 'light' ? `<i class="fas fa-moon mr-2"></i> โหมดกลางคืน` : `<i class="fas fa-sun mr-2"></i> โหมดกลางวัน`;
        }
        
        // --- 4. กลุ่มฟังก์ชัน Render UI ---
        function getSongCard(song) {
            const imageUrl = song.album?.images?.[0]?.url || 'https://placehold.co/100x100';
            const artistName = song.artists?.map(a => a.name).join(', ') || 'ศิลปิน';
            const songName = song.name || 'เพลง';
            const spotifyUrl = song.external_urls?.spotify || '#';
            
            return `<div class="song-item-card p-3 rounded-lg border flex items-center space-x-3 mb-2">
                <img src="${imageUrl}" class="w-16 h-16 rounded-lg object-cover">
                <div class="flex-1 text-left">
                    <div class="font-semibold">${songName}</div>
                    <div class="text-sm opacity-80">${artistName}</div>
                </div>
                <button class="feedback-btn text-xl text-gray-400 hover:text-green-500 transition" data-uri="${song.uri}" data-feedback="like">👍</button>
                <button class="feedback-btn text-xl text-gray-400 hover:text-red-500 transition" data-uri="${song.uri}" data-feedback="dislike">👎</button>
                <button class="show-details-btn text-sm py-2 px-4 rounded-full bg-gray-600 hover:bg-gray-700 transition" 
                        data-uri="${song.uri}" data-name="${songName}" data-artist="${artistName}" data-image="${imageUrl}">
                    <i class="fas fa-info-circle"></i>
                </button>
                <a href="${spotifyUrl}" target="_blank" class="flex-shrink-0 py-2 px-4 rounded-full bg-green-500 text-white hover:bg-green-600">
                    <i class="fab fa-spotify"></i>
                </a>
            </div>`;
        }

        function renderMessage(htmlContent, isUser = false, songs = null, recommendationText = '') {
            const bubble = document.createElement('div');
            bubble.classList.add('flex', 'items-start', 'mb-4');
            if (isUser) {
                bubble.classList.add('justify-end');
            }

            let messageBody = '';
            if (isUser) {
                messageBody = `<div class="bg-green-500 p-4 rounded-xl rounded-tr-none max-w-xl shadow"><p class="text-sm text-white">${htmlContent}</p></div>`;
            } else {
                let pinButtonHTML = '';
                if (songs && songs.length > 0) {
                    const songsData = encodeURIComponent(JSON.stringify(songs));
                    const recTextData = encodeURIComponent(recommendationText);
                    
                    pinButtonHTML = `
                        <div class="mt-3 pt-3 border-t border-gray-500 border-opacity-50">
                            <button class="pin-playlist-btn text-xs py-1 px-3 rounded-full bg-blue-600 hover:bg-blue-700 text-white transition"
                                    data-songs='${songsData}'
                                    data-rec-text='${recTextData}'>
                                <i class="fas fa-thumbtack mr-1"></i> Pin Playlist นี้ไว้
                            </button>
                        </div>`;
                }

                messageBody = `
                    <div class="w-10 h-10 rounded-full flex-shrink-0 mr-3"><i class="fas fa-robot text-4xl text-green-500"></i></div>
                    <div class="flex-1">
                        <div class="bg-[var(--chat-bubble-ai)] p-4 rounded-xl rounded-tl-none max-w-xl shadow">
                            ${htmlContent}
                            ${pinButtonHTML} 
                        </div>
                    </div>`;
            }

            bubble.innerHTML = messageBody;
            chatHistory.appendChild(bubble);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function updateUIForLoginState() {
            const displayName = localStorage.getItem('spotify_display_name');
            const avatar = localStorage.getItem('spotify_avatar');
            const isLoggedIn = !!localStorage.getItem('spotify_access_token') && !!displayName;
            userDisplayNameElem.textContent = displayName || 'User';
            userAvatarElem.src = avatar || 'https://placehold.co/100x100/1DB954/ffffff?text=U';
            spotifyLoginButton.classList.toggle('hidden', isLoggedIn);
            spotifyLogoutButton.classList.toggle('hidden', !isLoggedIn);
        }
        
        // --- 5. กลุ่มฟังก์ชันหลัก (Core Logic) ---

        // (ใหม่) ดึงและแสดงผลเพลย์ลิสต์ที่ Pin ไว้จาก Backend
        async function fetchAndRenderPinnedPlaylists() {
        try {
            const headers = getAuthHeaders(); // <-- เรียกใช้ฟังก์ชันใหม่
            const response = await fetch('/pinned_playlists', { headers });
            if (!response.ok) throw new Error('Could not fetch pinned playlists');
            
            pinnedPlaylists = await response.json();
                
                playlistHistoryContainer.innerHTML = ''; // ล้างของเก่า
                pinnedPlaylists.forEach((item, index) => {
                    const date = new Date(item.timestamp).toLocaleDateString('th-TH');
                    const historyElement = document.createElement('button');
                    historyElement.className = 'w-full text-left text-sm p-2 rounded-lg hover:bg-gray-700 transition-colors text-gray-300';
                    historyElement.innerHTML = `<div class="font-medium">${item.name}</div><div class="text-xs text-gray-400">Pinned on: ${date}</div>`;
                    historyElement.dataset.index = index;
                    playlistHistoryContainer.appendChild(historyElement);
                });
            } catch (error) {
            console.error("Fetch Pinned Error:", error);
            // อาจจะเพิ่มการจัดการ เช่น ถ้า Error เพราะ Token ให้ Logout
            if (error.message.includes("User not logged in")) {
                handleSpotifyLogout();
            }
        }
    }

        // (ใหม่) จัดการเมื่อผู้ใช้กดปุ่ม Pin Playlist
        async function handlePinClick(event) {
        const pinButton = event.target.closest('.pin-playlist-btn');
        if (!pinButton) return;

        const accessToken = localStorage.getItem('spotify_access_token');
        if (!accessToken) {
            alert('กรุณาเข้าสู่ระบบ Spotify ก่อน Pin เพลย์ลิสต์ครับ');
            return;
        }

        try {
            const songs = JSON.parse(decodeURIComponent(pinButton.dataset.songs));
            const recText = decodeURIComponent(pinButton.dataset.recText);
            const playlistName = `AI Playlist - ${new Date().toLocaleTimeString('th-TH')}`;

            // --- THIS IS THE FIX ---
            // Create a new, simplified list of song objects for storage.
            // This removes any complex or non-serializable data types.
            const simplifiedSongs = songs.map(song => ({
                uri: song.uri,
                name: song.name,
                artists: song.artists.map(a => ({ name: a.name })),
                album: {
                    images: song.album.images
                },
                external_urls: {
                    spotify: song.external_urls.spotify
                }
            }));
            // ---------------------

            const response = await fetch('/pin_playlist', {
                method: 'POST',
                headers: getAuthHeaders(),
                // Send the simplified song list instead of the original one
                body: JSON.stringify({
                    playlist_name: playlistName,
                    songs: simplifiedSongs, // <-- Use the clean data
                    recommendation_text: recText
                })
            });

            if (!response.ok) throw new Error('Failed to pin playlist');

            await fetchAndRenderPinnedPlaylists();
            pinButton.textContent = 'Pinned!';
            pinButton.disabled = true;
        } catch (error) {
            console.error("Pinning Error:", error);
            alert('เกิดข้อผิดพลาดในการ Pin เพลย์ลิสต์');
        }
    }

        // (อัปเกรด) แสดงเพลย์ลิสต์ที่เลือกจากประวัติ
        function displayPlaylistFromHistory(historyIndex) {
            const historyItem = pinnedPlaylists[historyIndex];
            if (!historyItem) return;
            const content = `<p class="text-sm">${historyItem.recommendationText}</p><div class="mt-4">${historyItem.songs.map(getSongCard).join('')}</div>`;
            renderMessage(content, false, historyItem.songs, historyItem.recommendationText);
            currentRecommendedSongs = historyItem.songs;
            playlistControls.classList.remove('hidden');
        }

        function handleSpotifyLogin() { window.location.href = '/spotify_login'; }
        
        function handleSpotifyLogout() {
            localStorage.clear();
            updateUIForLoginState();
            playlistHistoryContainer.innerHTML = ''; // เคลียร์ประวัติที่แสดงผล
            renderMessage('<p class="text-sm">ออกจากระบบ Spotify แล้ว</p>');
        }
        
        async function getUserProfile(accessToken) { // accessToken parameter is no longer needed but we can leave it for now
            try {
                // --- บรรทัดที่แก้ไข ---
                const headers = getAuthHeaders(); // ใช้ฟังก์ชันที่เราสร้างไว้เพื่อเอา Header ทั้งหมด
                const response = await fetch('/me', { headers: headers }); // ส่ง Header ทั้งชุดเข้าไป
                // --------------------

                if (!response.ok) throw new Error('Failed to fetch profile from backend');
                const profile = await response.json();
                localStorage.setItem('spotify_display_name', profile.display_name);
                if (profile.images && profile.images.length > 0) {
                    localStorage.setItem('spotify_avatar', profile.images[0].url);
                }
                return true;
            } catch (error) {
                console.error('Error fetching profile, logging out:', error);
                handleSpotifyLogout();
                return false;
            }
        }

        async function sendMessageToBackend() {
            if (isFetching || userInput.value.trim() === '') return;
            const userMessage = userInput.value.trim();
            renderMessage(userMessage, true);
            userInput.value = '';
            isFetching = true;
            showLoading(true);
            playlistControls.classList.add('hidden');

            const requestBody = {
                message: userMessage,
                spotify_access_token: localStorage.getItem('spotify_access_token'),
                spotify_refresh_token: localStorage.getItem('spotify_refresh_token'),
                expires_at: parseInt(localStorage.getItem('spotify_expires_at'), 10)
            };

            try {
                let headers = { 'Content-Type': 'application/json' };
                try {
                    // พยายามดึง Auth Headers ถ้าผู้ใช้ล็อกอินอยู่
                    const authHeaders = getAuthHeaders();
                    // นำ Header ทั้งสองชุดมารวมกัน
                    headers = { ...headers, ...authHeaders };
                } catch (error) {
                    // ถ้าดึงไม่ได้ (ผู้ใช้ยังไม่ล็อกอิน) ก็ไม่เป็นไร
                    console.log("Sending chat message as a guest.");
                }

                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: headers, // <--- ใช้ Header ที่เราเตรียมไว้
                    body: JSON.stringify(requestBody)
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Server error');
                }
                const data = await response.json();
                
                currentRecommendedSongs = (data.songs_found && data.songs_found.length > 0) ? data.songs_found : [];
                if (currentRecommendedSongs.length > 0) {
                    playlistControls.classList.remove('hidden');
                }

                const content = `<p class="text-sm whitespace-pre-wrap">${data.response || ''}</p>
                                 ${data.songs_found ? `<div class="mt-4">${data.songs_found.map(getSongCard).join('')}</div>` : ''}`;
                
                renderMessage(content, false, data.songs_found, data.response);

            } catch (error) {
                renderMessage(`<p class="text-sm">ขออภัยค่ะ เกิดข้อผิดพลาด: ${error.message}</p>`);
            } finally {
                isFetching = false;
                showLoading(false);
            }
        }

        async function handleCreatePlaylist() {
            if (currentRecommendedSongs.length === 0) return;
            const playlistName = `AI Playlist: ${new Date().toLocaleString('th-TH')}`;
            const trackUris = currentRecommendedSongs.map(s => s.uri);
            showLoading(true);
            try {
                let headers = { 'Content-Type': 'application/json' };
                try {
                    // พยายามดึง Auth Headers ถ้าผู้ใช้ล็อกอินอยู่
                    const authHeaders = getAuthHeaders();
                    // นำ Header ทั้งสองชุดมารวมกัน
                    headers = { ...headers, ...authHeaders };
                } catch (error) {
                    // ถ้าดึงไม่ได้ (ผู้ใช้ยังไม่ล็อกอิน) ก็ไม่เป็นไร
                    console.log("Sending chat message as a guest.");
                }
                const response = await fetch('/create_playlist', {
                    method: 'POST',
                    headers: headers, // <-- ใช้ Headers ที่สร้างไว้
                    body: JSON.stringify({ playlist_name: playlistName, track_uris: trackUris })
                });
                if (!response.ok) throw new Error('Failed to create playlist');
                const result = await response.json();
                
                const successMessage = `<p class="text-sm">สร้างเพลย์ลิสต์ '${playlistName}' ให้เรียบร้อยแล้วครับ!</p>
                    <a href="${result.playlist_info.external_urls.spotify}" target="_blank" class="inline-block mt-2 text-sm py-2 px-4 rounded-full bg-green-500 text-white hover:bg-green-600">
                        <i class="fab fa-spotify mr-2"></i> เปิดใน Spotify
                    </a>`;
                renderMessage(successMessage);
            } catch (error) {
                renderMessage('<p class="text-sm">ขออภัยครับ เกิดข้อผิดพลาดในการสร้างเพลย์ลิสต์</p>');
            } finally {
                showLoading(false);
            }
        }
        
        async function handleShowDetails(e) {
            const button = e.target.closest('.show-details-btn');
            if (!button) return;
            document.getElementById('modal-album-art').src = button.dataset.image;
            document.getElementById('modal-song-title').textContent = button.dataset.name;
            document.getElementById('modal-artist-name').textContent = button.dataset.artist;
            document.getElementById('modal-analysis-content').innerHTML = '<p>กำลังโหลดการวิเคราะห์...</p>';
            openModal();
            try {
                const accessToken = localStorage.getItem('spotify_access_token');
                const response = await fetch(`/song_details/${encodeURIComponent(button.dataset.uri)}`, {
                    headers: getAuthHeaders()
                });
                if (!response.ok) throw new Error('Failed to fetch details');
                const details = await response.json();
                const analysisHtml = details.gemini_analysis.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                document.getElementById('modal-analysis-content').innerHTML = analysisHtml;
            } catch (error) {
                document.getElementById('modal-analysis-content').innerHTML = '<p>ไม่สามารถโหลดข้อมูลการวิเคราะห์ได้</p>';
            }
        }

        function getAuthHeaders() {
            const accessToken = localStorage.getItem('spotify_access_token');
            if (!accessToken) {
                // อาจจะโยน Error หรือคืนค่าว่างเพื่อให้ fetch ล้มเหลวและจัดการต่อไป
                throw new Error("User not logged in");
            }
            return {
                'Authorization': `Bearer ${accessToken}`,
                'X-Refresh-Token': localStorage.getItem('spotify_refresh_token') || '',
                'X-Expires-At': localStorage.getItem('spotify_expires_at') || '0',
                'Content-Type': 'application/json' // เพิ่มไว้เผื่อ POST request
            };
        }


        async function handleFeedback(e) {
                const button = e.target.closest('.feedback-btn');
                if (!button) return;
                const trackUri = button.dataset.uri;
                const feedback = button.dataset.feedback;
                const accessToken = localStorage.getItem('spotify_access_token');
                if (!accessToken) {
                    renderMessage('<p class="text-sm">กรุณาเข้าสู่ระบบ Spotify ก่อนให้ Feedback ครับ</p>');
                    return;
                }
                try {
                    const response = await fetch('/feedback', {
                        method: 'POST',
                        headers: getAuthHeaders(),
                        body: JSON.stringify({ track_uri: trackUri, feedback: feedback })
                    });
                    if (!response.ok) throw new Error('Failed to save feedback');
                    button.style.transform = 'scale(1.5)';
                    setTimeout(() => { button.style.transform = 'scale(1)'; }, 200);
                    const parentCard = button.closest('.song-item-card');
                    parentCard.querySelectorAll('.feedback-btn').forEach(btn => btn.style.display = 'none');
                } catch (error) {
                    console.error('Feedback Error:', error);
                }
            }

        // --- 6. ฟังก์ชันเริ่มต้นแอป (Initialize App) ---
        async function initializeApp() {
            applyTheme(currentTheme);
            const urlParams = new URLSearchParams(window.location.search);
            const accessToken = urlParams.get('access_token');

            if (accessToken) {
                const expiresIn = urlParams.get('expires_in');
                const refreshToken = urlParams.get('refresh_token');
                const expiresAt = Date.now() + (parseInt(expiresIn, 10) * 1000);
                localStorage.setItem('spotify_access_token', accessToken);
                localStorage.setItem('spotify_expires_at', expiresAt);
                if (refreshToken) { localStorage.setItem('spotify_refresh_token', refreshToken); }
                window.history.replaceState({}, document.title, "/");
                
                const profileFetched = await getUserProfile(accessToken);
                if (profileFetched) {
                    renderMessage('<p class="text-sm">เข้าสู่ระบบ Spotify สำเร็จแล้ว!</p>');
                    await fetchAndRenderPinnedPlaylists(); 
                }
            } else if (localStorage.getItem('spotify_access_token')) {
                await fetchAndRenderPinnedPlaylists();
            }
            updateUIForLoginState();
            
            // --- ผูก Event Listeners ทั้งหมดที่นี่ที่เดียว ---
            sendButton.addEventListener('click', sendMessageToBackend);
            userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessageToBackend(); });
            sidebarToggle.addEventListener('click', openSidebar);
            sidebarCloseBtn.addEventListener('click', closeSidebar);
            sidebarOverlay.addEventListener('click', closeSidebar);
            spotifyLoginButton.addEventListener('click', handleSpotifyLogin);
            spotifyLogoutButton.addEventListener('click', handleSpotifyLogout);
            themeToggleButton.addEventListener('click', toggleTheme);
            createPlaylistBtn.addEventListener('click', handleCreatePlaylist);
            modalCloseBtn.addEventListener('click', closeModal);
            songModalOverlay.addEventListener('click', (e) => { if (e.target === songModalOverlay) closeModal(); });
            
            // --- Event Bubbling: ใช้ chatHistory เป็นตัวดักจับ Event หลัก ---
            chatHistory.addEventListener('click', (e) => {
                if (e.target.closest('.feedback-btn')) handleFeedback(e);
                if (e.target.closest('.show-details-btn')) handleShowDetails(e);
                if (e.target.closest('.pin-playlist-btn')) handlePinClick(e);
            });

            playlistHistoryContainer.addEventListener('click', (e) => {
                const button = e.target.closest('button');
                if (button && button.dataset.index) {
                    displayPlaylistFromHistory(parseInt(button.dataset.index, 10));
                }
            });
        }
        
        // --- 7. เริ่มต้นแอป ---
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
